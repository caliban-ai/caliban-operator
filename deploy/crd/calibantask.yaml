apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: calibantasks.caliban.caliban-ai.dev
spec:
  group: caliban.caliban-ai.dev
  names:
    categories: []
    kind: CalibanTask
    plural: calibantasks
    shortNames:
    - ctask
    singular: calibantask
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for CalibanTaskSpec via `CustomResource`
        properties:
          spec:
            description: 'Desired state of a caliban task: a workspace of sources + the task to run.'
            properties:
              isolation:
                description: Sandbox isolation configuration.
                nullable: true
                properties:
                  runtimeClass:
                    description: RuntimeClass (e.g. `gvisor`, `kata`).
                    nullable: true
                    type: string
                  worktrees:
                    description: Worktree isolation strategy (e.g. `per-source`).
                    nullable: true
                    type: string
                type: object
              lifecycle:
                description: Idle/drain lifecycle policy.
                nullable: true
                properties:
                  idleTimeout:
                    description: Idle timeout before pause (e.g. `30m`).
                    nullable: true
                    type: string
                  onDelete:
                    description: 'On delete: `checkpoint` or `delete`.'
                    nullable: true
                    type: string
                type: object
              model:
                description: Model-router configuration.
                nullable: true
                properties:
                  routerConfigRef:
                    description: Name of a ConfigMap holding the router config.
                    nullable: true
                    type: string
                type: object
              providerRef:
                description: |-
                  Which of the workspace's providers to bind; defaults to the workspace's
                  `defaultProvider` (or its sole provider).
                nullable: true
                type: string
              resources:
                description: 'Resource class → a SandboxTemplate (consumed in #283).'
                nullable: true
                properties:
                  class:
                    description: Named resource class (e.g. `standard`).
                    nullable: true
                    type: string
                type: object
              state:
                description: Persistence (gonzalo) configuration.
                nullable: true
                properties:
                  gonzaloEndpoint:
                    description: gonzalod endpoint the pod uses for shared state.
                    nullable: true
                    type: string
                  mode:
                    description: '`remote` (shared gonzalod) or `local` (in-pod).'
                    nullable: true
                    type: string
                type: object
              task:
                description: The task itself.
                properties:
                  agentType:
                    description: Agent type (e.g. `general-purpose`).
                    nullable: true
                    type: string
                  prompt:
                    description: Initial prompt.
                    minLength: 1
                    type: string
                required:
                - prompt
                type: object
              tools:
                description: Per-run tool override (allow-list) for this task's agents.
                items:
                  type: string
                nullable: true
                type: array
              workspaceRef:
                description: Reference to the namespace-local `Workspace` this task runs against.
                properties:
                  name:
                    description: Workspace object name.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - task
            - workspaceRef
            type: object
          status:
            description: Observed state of a `CalibanTask`.
            nullable: true
            properties:
              calibandEndpoint:
                description: caliband session endpoint (host:port), once the Sandbox is ready.
                nullable: true
                type: string
              checkpointRef:
                description: Latest checkpoint reference.
                nullable: true
                type: string
              conditions:
                description: Standard Kubernetes conditions.
                items:
                  description: A minimal Kubernetes-style condition.
                  properties:
                    message:
                      description: Human-readable message.
                      nullable: true
                      type: string
                    reason:
                      description: Machine-readable reason.
                      nullable: true
                      type: string
                    status:
                      description: '`True` / `False` / `Unknown`.'
                      type: string
                    type:
                      description: Condition type (e.g. `Ready`).
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              phase:
                default: Pending
                description: Lifecycle phase.
                enum:
                - Pending
                - Provisioning
                - Running
                - Draining
                - Completed
                - Failed
                type: string
              resolvedWorkspace:
                description: |-
                  Resolved workspace config, pinned at admission (immutable run). Set once;
                  later `Workspace` edits don't re-pin a running task.
                nullable: true
                properties:
                  env:
                    description: Non-secret env from the workspace.
                    items:
                      description: A non-secret environment entry.
                      properties:
                        name:
                          description: Variable name.
                          minLength: 1
                          type: string
                        value:
                          description: Variable value.
                          type: string
                      required:
                      - name
                      - value
                      type: object
                    type: array
                  isolation:
                    description: Workspace default isolation.
                    nullable: true
                    properties:
                      runtimeClass:
                        description: RuntimeClass (e.g. `gvisor`, `kata`).
                        nullable: true
                        type: string
                      worktrees:
                        description: Worktree isolation strategy (e.g. `per-source`).
                        nullable: true
                        type: string
                    type: object
                  provider:
                    description: The single provider this task binds to.
                    properties:
                      baseUrl:
                        description: Base URL, if set.
                        nullable: true
                        type: string
                      credentialsRef:
                        description: Credential Secret reference, if the provider needs one.
                        nullable: true
                        properties:
                          key:
                            description: Key within the Secret's data.
                            minLength: 1
                            type: string
                          secretName:
                            description: Name of the Secret (same namespace).
                            minLength: 1
                            type: string
                        required:
                        - key
                        - secretName
                        type: object
                      kind:
                        description: Provider kind.
                        type: string
                      model:
                        description: Model, if set.
                        nullable: true
                        type: string
                      name:
                        description: Provider name.
                        type: string
                    required:
                    - kind
                    - name
                    type: object
                  sources:
                    description: The workspace's source checkouts.
                    items:
                      description: A single source checkout in the workspace.
                      properties:
                        name:
                          description: Source identifier (matches caliband's workspace source name).
                          minLength: 1
                          type: string
                        path:
                          description: Absolute mount path in the pod (e.g. `/work/caliban`).
                          minLength: 1
                          type: string
                        ref:
                          default: main
                          description: Git ref to check out. Defaults to `main`.
                          type: string
                        repo:
                          description: Git remote to clone.
                          minLength: 1
                          type: string
                      required:
                      - name
                      - path
                      - repo
                      type: object
                    type: array
                required:
                - provider
                - sources
                type: object
              sandboxRef:
                description: The agent-sandbox Sandbox backing this task.
                nullable: true
                properties:
                  name:
                    description: Object name.
                    type: string
                required:
                - name
                type: object
              workspace:
                description: Observed workspace (incl. runtime-added sources).
                nullable: true
                properties:
                  materialized:
                    default: []
                    description: Source names observed materialized in the pod.
                    items:
                      type: string
                    type: array
                type: object
            type: object
        required:
        - spec
        title: CalibanTask
        type: object
    served: true
    storage: true
    subresources:
      status: {}
